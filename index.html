<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Star Trivia</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>

    <div id="side-menu">
        <div class="menu-section">
            <div class="label">DIFFICULTY</div>
            <div class="toggle-btn" id="diff-toggle">Easy</div>
        </div>
        <div class="menu-section">
            <div class="label">FILM ERA</div>
            <div class="toggle-btn" id="era-toggle">All</div>
        </div>
        <div class="menu-section">
            <div class="label">REGION</div>
            <div class="toggle-btn" id="region-toggle">Domestic</div>
        </div>
    </div>

    <div id="game-container">
        <div id="nav-container">
            <div id="hamburger" onclick="toggleDrawer()">≡</div>
            <div id="drawer">
                <div id="theme-toggle" class="drawer-item" onclick="toggleTheme()">TOGGLE THEME</div>
                <div class="drawer-item" onclick="location.reload()">RESET GAME</div>
            </div>
        </div>

        <div id="start-screen">
            <div style="font-size: 70px; margin-bottom: 20px;">🎬</div>
            <div id="game-title">FIVE STAR<br>TRIVIA</div>
            <div id="tagline">LIGHTS, CAMERA, ACTION!</div>
            <div id="press-start" onclick="startGame()">▶ PRESS START</div>
        </div>

        <div id="quiz-box">
            <div id="star-display">☆☆☆☆☆</div>
            <div id="question-text">...</div>
            <div id="options-container"></div>
        </div>

        <div id="result-screen">
            <h1 id="outcome-text">VICTORY!</h1>
            <p id="score-text">0/5</p>
            <div class="start-btn" onclick="startGame()">PLAY IT AGAIN, SAM?</div>
        </div>

        <div id="streak-display" class="streak-tag">STREAK: 0</div>
    </div>

<script src="src/script.js"></script>
</body>
</html>
