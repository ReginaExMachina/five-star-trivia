<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Star Trivia</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e12;
            --panel: #252525;
            --text: #ffffff;
            --gold: #ffcc00;
            --pixel-border: 4px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            height: 100vh;
            image-rendering: pixelated;
        }

        /* --- SIDEBAR --- */
        #side-menu {
            width: 280px;
            background: var(--panel);
            border-right: var(--pixel-border) solid #444;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .menu-section { margin-bottom: 40px; }
        .label { font-size: 8px; color: var(--gold); margin-bottom: 12px; }

        .toggle-btn, .start-btn {
            background: #333;
            border: var(--pixel-border) solid #fff;
            padding: 15px 10px;
            cursor: pointer;
            text-align: center;
            font-size: 10px;
            box-shadow: 6px 6px 0 #000;
            transition: transform 0.1s;
        }

        .toggle-btn:active, .start-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0 #000;
        }

        .toggle-btn:hover { background: #444; color: var(--gold); }

        /* --- MAIN AREA --- */
        #game-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }

        /* Hamburger Menu Styles */
        #nav-container {
            position: absolute;
            top: 25px;
            right: 25px;
            z-index: 100;
        }

        #hamburger {
            font-size: 28px;
            cursor: pointer;
            user-select: none;
        }

        #drawer {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--panel);
            border: var(--pixel-border) solid #fff;
            width: 200px;
            padding: 10px;
            box-shadow: 6px 6px 0 #000;
        }

        .drawer-item {
            font-size: 8px;
            padding: 15px 10px;
            cursor: pointer;
            border-bottom: 2px solid #444;
        }

        .drawer-item:hover { color: var(--gold); }

        #quiz-box { display: none; width: 100%; max-width: 600px; }
        #question-text { font-size: 14px; line-height: 1.8; margin-bottom: 40px; text-align: center; }

        .option {
            background: #222;
            border: var(--pixel-border) solid #555;
            padding: 20px;
            margin: 15px 0;
            cursor: pointer;
            font-size: 10px;
        }

        .correct { background: #008800 !important; border-color: #00ff00 !important; }
        .wrong { background: #880000 !important; border-color: #ff0000 !important; }

        #result-screen { text-align: center; display: none; }
        .streak-tag { position: absolute; bottom: 30px; color: var(--gold); font-size: 12px; }
        .hidden { display: none !important; }

        /* --- ARCADE START SCREEN --- */
        #start-screen { text-align: center; }

        #game-title {
            font-size: 36px;
            color: var(--gold);
            line-height: 1.6;
            /*text-shadow: 4px 4px 0 #000, 0 0 20px var(--gold), 0 0 40px #ff8800;*/
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #tagline {
            font-size: 9px;
            color: #aaa;
            margin-bottom: 50px;
            letter-spacing: 3px;
        }

        #press-start {
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            animation: blink 1s step-end infinite;
            padding: 10px;
        }

        #press-start:hover { color: var(--gold); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- STAR SCORE DISPLAY --- */
        #star-display {
            text-align: center;
            font-size: 22px;
            margin-bottom: 30px;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>

    <div id="side-menu">
        <div class="menu-section">
            <div class="label">DIFFICULTY</div>
            <div class="toggle-btn" id="diff-toggle">Easy</div>
        </div>
        <div class="menu-section">
            <div class="label">FILM ERA</div>
            <div class="toggle-btn" id="era-toggle">All</div>
        </div>
        <div class="menu-section">
            <div class="label">MARKET</div>
            <div class="toggle-btn" id="region-toggle">Domestic</div>
        </div>
    </div>

    <div id="game-container">
        <div id="nav-container">
            <div id="hamburger" onclick="toggleDrawer()">≡</div>
            <div id="drawer">
                <div class="drawer-item">TOGGLE THEME</div>
                <div class="drawer-item" onclick="location.reload()">RESET GAME</div>
            </div>
        </div>

        <div id="start-screen">
            <div style="font-size: 70px; margin-bottom: 20px;">🎬</div>
            <div id="game-title">FIVE STAR<br>TRIVIA</div>
            <div id="tagline">LIGHTS, CAMERA, ACTION!</div>
            <div id="press-start" onclick="startGame()">▶ PRESS START</div>
        </div>

        <div id="quiz-box">
            <div id="star-display">☆☆☆☆☆</div>
            <div id="question-text">...</div>
            <div id="options-container"></div>
        </div>

        <div id="result-screen">
            <h1 id="outcome-text">VICTORY!</h1>
            <p id="score-text">0/5</p>
            <div class="start-btn" onclick="startGame()">PLAY IT AGAIN, SAM?</div>
        </div>

        <div id="streak-display" class="streak-tag">STREAK: 0</div>
    </div>

    <script>
        const diffs = ["Easy", "Medium", "Hard", "Director Cut"];
        const eras = ["All", "Silent Era", "Golden Age", "New Hollywood", "80s", "90s", "Modern"];

        const questionsDB = [
            { q: "Which 1922 vampire film was an unauthorized Dracula adaptation?", a: ["Nosferatu", "The Cabinet of Dr. Caligari", "Metropolis"], c: 0, d: "Medium", e: "Silent Era", r: "International" },
            { q: "Who was known as 'The Little Tramp' in silent cinema?", a: ["Buster Keaton", "Charlie Chaplin", "Harold Lloyd"], c: 1, d: "Easy", e: "Silent Era", r: "Domestic" },
            { q: "Which 1927 Fritz Lang film features a robot named Maria?", a: ["Metropolis", "M", "Woman in the Moon"], c: 0, d: "Hard", e: "Silent Era", r: "International" },
            { q: "Which silent star was known as 'The Great Stone Face'?", a: ["Buster Keaton", "Lon Chaney", "Douglas Fairbanks"], c: 0, d: "Medium", e: "Silent Era", r: "Domestic" },
            { q: "What was the first 'Talkie' that ended the Silent Era?", a: ["The Jazz Singer", "Lights of New York", "Sunrise"], c: 0, d: "Easy", e: "Silent Era", r: "Domestic" },
            { q: "What color is the brick road in 'The Wizard of Oz'?", a: ["Red", "Yellow", "Gold"], c: 1, d: "Easy", e: "Golden Age", r: "Domestic" },
            { q: "Burt Lancaster stars as a prisoner in which 1962 classic?", a: ["Birdman of Alcatraz", "The Killers", "Sweet Smell of Success"], c: 0, d: "Medium", e: "Golden Age", r: "Domestic" },
            { q: "In 'Sweet Smell of Success', Burt Lancaster plays a ruthless...?", a: ["Columnist", "Politician", "Lawyer"], c: 0, d: "Hard", e: "Golden Age", r: "Domestic" },
            { q: "Which Jane Austen novel was adapted into the 1940 film starring Laurence Olivier?", a: ["Pride and Prejudice", "Emma", "Persuasion"], c: 0, d: "Medium", e: "Golden Age", r: "Domestic" },
            { q: "Which Japanese director made 'Seven Samurai' in 1954?", a: ["Akira Kurosawa", "Yasujirō Ozu", "Kenji Mizoguchi"], c: 0, d: "Easy", e: "Golden Age", r: "International" },
            { q: "Which 1953 Ozu film follows an elderly couple visiting Tokyo?", a: ["Tokyo Story", "Late Spring", "Floating Weeds"], c: 0, d: "Hard", e: "Golden Age", r: "International" },
            { q: "Who played the lead in the 1931 'M'?", a: ["Peter Lorre", "Bela Lugosi", "Boris Karloff"], c: 0, d: "Hard", e: "Golden Age", r: "International" },
            { q: "What was 'Rosebud' in Citizen Kane?", a: ["A Sled", "A Dog", "A Secret"], c: 0, d: "Hard", e: "Golden Age", r: "Domestic" },
            { q: "Which studio produced 'The Wizard of Oz'?", a: ["Warner Bros", "MGM", "RKO"], c: 1, d: "Hard", e: "Golden Age", r: "Domestic" },
            { q: "Who directed 'The Rules of the Game' (1939)?", a: ["Jean Renoir", "Marcel Carné", "Jean Cocteau"], c: 0, d: "Hard", e: "Golden Age", r: "International" },
            { q: "Who directed 'Jaws' (1975)?", a: ["Spielberg", "Lucas", "Coppola"], c: 0, d: "Easy", e: "New Hollywood", r: "Domestic" },
            { q: "Despite playing a much older woman, Anne Bancroft was only 6 years older than her co-star in which 1967 classic?", a: ["The Graduate", "Barefoot in the Park", "The Apartment"], c: 0, d: "Medium", e: "New Hollywood", r: "Domestic" },
            { q: "Burt Lancaster starred with Alain Delon in which 1963 Visconti epic?", a: ["The Leopard", "Rocco and His Brothers", "Senso"], c: 0, d: "Hard", e: "New Hollywood", r: "International" },
            { q: "Which 1970s Japanese horror film features a carnivorous piano?", a: ["Hausu", "Ring", "Audition"], c: 0, d: "Medium", e: "New Hollywood", r: "International" },
            { q: "Who directed the 1976 film 'Taxi Driver'?", a: ["Scorsese", "De Palma", "Friedkin"], c: 0, d: "Easy", e: "New Hollywood", r: "Domestic" },
            { q: "Which lens did Kubrick use for 'Barry Lyndon' NASA shots?", a: ["Zeiss f/0.7", "Cooke S4", "Arri Signature"], c: 0, d: "Director Cut", e: "New Hollywood", r: "International" },
            { q: "Tarkovsky's 'Stalker' was filmed in which country?", a: ["Estonia", "Russia", "Latvia"], c: 0, d: "Director Cut", e: "New Hollywood", r: "International" },
            { q: "In which 1986 film does Tom Cruise play a fighter pilot?", a: ["Top Gun", "Cocktail", "Legend"], c: 0, d: "Easy", e: "80s", r: "Domestic" },
            { q: "Tom Cruise played a pool shark in which 1986 Scorsese film?", a: ["The Color of Money", "Rain Man", "Risky Business"], c: 0, d: "Medium", e: "80s", r: "Domestic" },
            { q: "Which 1985 Rom-Com stars Molly Ringwald and a 'Brat Pack' cast?", a: ["The Breakfast Club", "Pretty in Pink", "Sixteen Candles"], c: 2, d: "Easy", e: "80s", r: "Domestic" },
            { q: "Katsuhiro Otomo directed which 1988 cyberpunk masterpiece?", a: ["Akira", "Ghost in the Shell", "Paprika"], c: 0, d: "Medium", e: "80s", r: "International" },
            { q: "Which 1987 Japanese film follows a 'Food Western' about noodles?", a: ["Tampopo", "High and Low", "Ran"], c: 0, d: "Hard", e: "80s", r: "International" },
            { q: "Which 1995 Jane Austen adaptation stars Alicia Silverstone (modernized)?", a: ["Clueless", "Emma", "Sense and Sensibility"], c: 0, d: "Easy", e: "90s", r: "Domestic" },
            { q: "Ang Lee directed which 1995 Austen adaptation?", a: ["Sense and Sensibility", "Persuasion", "Mansfield Park"], c: 0, d: "Medium", e: "90s", r: "Domestic" },
            { q: "Tom Cruise starred as Ethan Hunt for the first time in which year?", a: ["1996", "1994", "1998"], c: 0, d: "Medium", e: "90s", r: "Domestic" },
            { q: "Which 1990 Rom-Com features Richard Gere and Julia Roberts?", a: ["Pretty Woman", "Notting Hill", "Runaway Bride"], c: 0, d: "Easy", e: "90s", r: "Domestic" },
            { q: "Which 1997 Japanese film is a psychological thriller about an idol?", a: ["Perfect Blue", "Cure", "Hana-bi"], c: 0, d: "Hard", e: "90s", r: "International" },
            { q: "Tom Cruise stars in which 1999 Kubrick film?", a: ["Eyes Wide Shut", "Magnolia", "The Firm"], c: 0, d: "Medium", e: "90s", r: "Domestic" },
            { q: "Which 1994 film features a box of chocolates?", a: ["Forrest Gump", "Speed", "The Mask"], c: 0, d: "Easy", e: "90s", r: "Domestic" },
            { q: "Who directed the 'Three Colors' trilogy?", a: ["Kieslowski", "Godard", "Truffaut"], c: 0, d: "Medium", e: "90s", r: "International" },
            { q: "In 'Pan's Labyrinth', what is the protagonist's name?", a: ["Ofelia", "Carmen", "Mercedes"], c: 0, d: "Medium", e: "Modern", r: "International" },
            { q: "What is the runtime of 'Sátántangó'?", a: ["Over 7 hours", "4 hours", "6 hours"], c: 0, d: "Director Cut", e: "90s", r: "International" },
            { q: "Which 2019 film was the first non-English movie to win Best Picture?", a: ["Parasite", "Roma", "Drive My Car"], c: 0, d: "Easy", e: "Modern", r: "International" },
            { q: "Tom Cruise performed a HALO jump for which 'Mission Impossible'?", a: ["Fallout", "Ghost Protocol", "Rogue Nation"], c: 0, d: "Medium", e: "Modern", r: "Domestic" },
            { q: "Which 2005 Austen adaptation stars Keira Knightley?", a: ["Pride & Prejudice", "Becoming Jane", "Love & Friendship"], c: 0, d: "Easy", e: "Modern", r: "Domestic" },
            { q: "Which hero wields a shield in 'The Avengers'?", a: ["Iron Man", "Thor", "Captain America"], c: 2, d: "Easy", e: "Modern", r: "Domestic" },
            { q: "In 'Toy Story', who is Buzz Lightyear's best friend?", a: ["Woody", "Rex", "Slinky"], c: 0, d: "Easy", e: "90s", r: "Domestic" },
            { q: "Which city is the setting for 'Parasite'?", a: ["Tokyo", "Seoul", "Hong Kong"], c: 1, d: "Medium", e: "Modern", r: "International" },
            { q: "Which country produced 'Amélie'?", a: ["Belgium", "France", "Switzerland"], c: 1, d: "Medium", e: "Modern", r: "International" },
            { q: "Who was the DP for 'The Tree of Life'?", a: ["Lubezki", "Deakins", "Prieto"], c: 0, d: "Director Cut", e: "Modern", r: "Domestic" },
            { q: "Which film has the longest continuous shot in history?", a: ["Russian Ark", "1917", "Birdman"], c: 0, d: "Director Cut", e: "Modern", r: "International" }
        ];

        let state = {
            diff: "Easy", era: "All", region: "Domestic",
            score: 0, streak: 0, currentIdx: 0, activeSet: []
        };

        function toggleDrawer() {
            const d = document.getElementById('drawer');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        document.getElementById('diff-toggle').onclick = (e) => {
            state.diff = diffs[(diffs.indexOf(state.diff) + 1) % diffs.length];
            e.target.innerText = state.diff;
        };
        document.getElementById('era-toggle').onclick = (e) => {
            state.era = eras[(eras.indexOf(state.era) + 1) % eras.length];
            e.target.innerText = state.era;
        };
        document.getElementById('region-toggle').onclick = (e) => {
            state.region = state.region === "Domestic" ? "International" : "Domestic";
            e.target.innerText = state.region;
        };

        function startGame() {
            let pool = questionsDB.filter(q => 
                q.d === state.diff && 
                q.r === state.region && 
                (state.era === "All" || q.e === state.era)
            );

            if (pool.length < 5) {
                let fillers = questionsDB.filter(q => q.d === state.diff && !pool.includes(q));
                pool = [...pool, ...fillers];
            }

            if (pool.length < 5) pool = [...questionsDB];

            state.activeSet = pool.sort(() => 0.5 - Math.random()).slice(0, 5);
            state.score = 0;
            state.currentIdx = 0;
            document.getElementById('star-display').innerText = '☆☆☆☆☆';

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'block';
            document.getElementById('drawer').style.display = 'none';
            renderQuestion();
        }

        function renderQuestion() {
            const q = state.activeSet[state.currentIdx];
            if (!q) return showResults();

            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => {
                    const btns = document.querySelectorAll('.option');
                    btns.forEach(b => b.style.pointerEvents = 'none');
                    if(i === q.c) {
                        btn.classList.add('correct');
                        state.score++;
                        document.getElementById('star-display').innerText = '⭐'.repeat(state.score) + '☆'.repeat(5 - state.score);
                    }
                    else { btn.classList.add('wrong'); btns[q.c].classList.add('correct'); }
                    setTimeout(() => {
                        state.currentIdx++;
                        if(state.currentIdx < 5) renderQuestion();
                        else showResults();
                    }, 800);
                };
                container.appendChild(btn);
            });
        }

        function showResults() {
            document.getElementById('quiz-box').style.display = 'none';
            const res = document.getElementById('result-screen');
            res.style.display = 'block';
            const won = state.score >= 3;
            document.getElementById('outcome-text').innerText = won ? "VICTORY!" : "GAME OVER";
            document.getElementById('score-text').innerText = '⭐'.repeat(state.score) + '☆'.repeat(5 - state.score);
            state.streak = won ? state.streak + 1 : 0;
            document.getElementById('streak-display').innerText = `STREAK: ${state.streak}`;
        }
    </script>
</body>
</html>
